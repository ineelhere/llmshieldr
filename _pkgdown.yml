url: http://www.indraneelchakraborty.com/llmshieldr/

template:
  bootstrap: 5
  light-switch: true
  bootswatch: zephyr

development:
  mode: auto

home:
  title: llmshieldr
  description: Safety guardrails for LLM workflows in R.

navbar:
  structure:
    left: [intro, reference, articles]
    right: [search, github, lightswitch]
  components:
    intro:
      text: Get Started
      href: articles/getting-started.html
    github:
      icon: fa-github
      href: https://github.com/ineelhere/llmshieldr
      aria-label: GitHub

reference:
  - title: Policies and Rules
    contents:
      - build_policy
      - policy_preset
      - add_rule
      - remove_rule
      - list_rules
      - starts_with("rule_")
  - title: Scanners
    contents:
      - scan_prompt
      - preflight_check
      - scan_context
      - scan_output
  - title: Orchestration
    contents:
      - secure_chat
      - shield_ollama
      - trust_boundary
      - rate_guard
  - title: Audit and Explanation
    contents:
      - write_audit_log
      - explain_findings
      - example_prompts
  - title: Constructors
    contents:
      - shieldr_rule
      - shieldr_policy
      - shieldr_report
      - shieldr_audit
      - shieldr_result
      - print.shieldr_policy
      - print.shieldr_report

articles:
  - title: Articles
    navbar: ~
    contents:
      - getting-started
      - policy-design
      - custom-rules
      - rag-pipeline
      - owasp-coverage

search:
  enabled: true
  indexUrl: search/search-index.json

footer:
  structure:
    left: [developed_by]
  components:
    developed_by: Developed by <a href="https://www.linkedin.com/in/indraneelchakraborty/" target="_blank">Indraneel Chakraborty</a>
